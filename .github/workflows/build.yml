name: Build LNReader Plugins

on:
  push:
    branches: [ master ]
  workflow_dispatch:
  
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build plugins
        run: npm run build:full

      - name: Commit build output
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add -f .dist/plugins.min.json
          git commit -m "auto build plugins" || echo "no changes"
          git push